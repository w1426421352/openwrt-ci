name: LibWrt 25.12 IPQ

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: ipq60xx-wifi
        type: choice
        options:
          - ipq60xx-wifi
          - ipq60xx-nowifi
          - xiaomi-ax6-wifi
      source_ref:
        description: LibWrt branch or tag
        required: true
        default: 25.12-nss
        type: string
      publish_release:
        description: Publish firmware to a GitHub Release
        required: true
        default: true
        type: boolean
permissions:
  contents: write

concurrency:
  group: libwrt-${{ github.workflow }}-${{ github.ref }}-${{ inputs.profile || 'ipq60xx-wifi' }}
  cancel-in-progress: false

env:
  REPO_URL: https://github.com/LiBwrt/LibWrt.git
  SOURCE_REF: ${{ inputs.source_ref || '25.12-nss' }}
  BUILD_PROFILE: ${{ inputs.profile || 'ipq60xx-wifi' }}
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ${{ inputs.profile || 'ipq60xx-wifi' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout build configuration
        uses: actions/checkout@v4

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo timedatectl set-timezone "$TZ"
          df -hT

      - name: Select profile
        run: |
          case "$BUILD_PROFILE" in
            ipq60xx-wifi)
              config_file="configs/libwrt-ipq60xx-wifi.config"
              target_subtarget="ipq60xx"
              expected_devices="CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_qihoo_360v6=y"
              release_tag="IPQ60XX-6.12-WIFI"
              release_description="360V6 带 Wi-Fi、带有线 NSS 的 LibWrt 25.12 固件"
              ;;
            ipq60xx-nowifi)
              config_file="configs/libwrt-ipq60xx-nowifi.config"
              target_subtarget="ipq60xx"
              expected_devices="CONFIG_TARGET_DEVICE_qualcommax_ipq60xx_DEVICE_zn_m2=y"
              release_tag="IPQ60XX-6.12-NOWIFI"
              release_description="ZN-M2 无 Wi-Fi、带有线 NSS 的 LibWrt 25.12 固件"
              ;;
            xiaomi-ax6-wifi)
              config_file="configs/libwrt-ipq807x-wifi.config"
              target_subtarget="ipq807x"
              expected_devices="CONFIG_TARGET_DEVICE_qualcommax_ipq807x_DEVICE_redmi_ax6=y"
              release_tag="IPQ807x-WIFI"
              release_description="小米/红米 AX6 带 Wi-Fi、带有线 NSS 的 LibWrt 25.12 固件"
              ;;
            *)
              echo "Unsupported profile: $BUILD_PROFILE" >&2
              exit 1
              ;;
          esac

          echo "CONFIG_FILE=$GITHUB_WORKSPACE/$config_file" >> "$GITHUB_ENV"
          echo "TARGET_SUBTARGET=$target_subtarget" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "RELEASE_DESCRIPTION=$release_description" >> "$GITHUB_ENV"
          {
            echo 'EXPECTED_DEVICES<<EOF'
            echo "$expected_devices"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Clone LibWrt
        run: |
          git clone --depth 1 --single-branch --branch "$SOURCE_REF" "$REPO_URL" openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> "$GITHUB_ENV"
          echo "SOURCE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "SOURCE_SHORT_SHA=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_ENV"
          git show -s --date=iso-strict --format='Source: %H%nDate: %cd%nSubject: %s'

      - name: Update feeds
        run: |
          cd "$OPENWRT_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate configuration
        run: |
          cd "$OPENWRT_PATH"
          cp "$CONFIG_FILE" .config
          make defconfig
          ./scripts/diffconfig.sh | tee "$RUNNER_TEMP/effective.config"

          grep -Fqx 'CONFIG_TARGET_qualcommax=y' .config
          grep -Fqx "CONFIG_TARGET_qualcommax_${TARGET_SUBTARGET}=y" .config
          while IFS= read -r device_config; do
            grep -Fqx "$device_config" .config
          done <<< "$EXPECTED_DEVICES"

      - name: Download source archives
        run: |
          cd "$OPENWRT_PATH"
          make download -j"$(nproc)"
          find dl -type f -size -1024c -print -delete

      - name: Compile firmware
        run: |
          cd "$OPENWRT_PATH"
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect firmware and packages
        run: |
          target_dir="$OPENWRT_PATH/bin/targets/qualcommax/$TARGET_SUBTARGET"
          output_dir="$GITHUB_WORKSPACE/output/$BUILD_PROFILE"

          test -d "$target_dir"
          mkdir -p "$output_dir"
          cp -a "$target_dir"/. "$output_dir"/
          cp "$OPENWRT_PATH/.config" "$output_dir/build.config"
          cp "$RUNNER_TEMP/effective.config" "$output_dir/effective.config"
          tar -C "$OPENWRT_PATH/bin" -czf "$output_dir/Packages.tar.gz" packages
          rm -rf "$output_dir/packages"

          checksum_file="$RUNNER_TEMP/sha256sums"
          (
            cd "$output_dir"
            find . -maxdepth 1 -type f ! -name sha256sums -print0 \
              | sort -z \
              | xargs -0 sha256sum
          ) > "$checksum_file"
          mv "$checksum_file" "$output_dir/sha256sums"
          cat "$output_dir/sha256sums"

          echo "OUTPUT_DIR=$output_dir" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.publish_release }}
        uses: actions/upload-artifact@v4
        with:
          name: libwrt-${{ env.BUILD_PROFILE }}-${{ env.SOURCE_SHORT_SHA }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
        uses: ncipollo/release-action@v1
        with:
          name: R${{ env.BUILD_DATE }} for ${{ env.RELEASE_TAG }}
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: false
          tag: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.OUTPUT_DIR }}/*
          body: |
            **This is OpenWrt Firmware for ${{ env.RELEASE_TAG }}**
            ### 📒 固件信息
            - ${{ env.RELEASE_DESCRIPTION }}
            - 💻 构建配置：${{ env.BUILD_PROFILE }}
            - ⚽ 固件源码：${{ env.REPO_URL }}
            - 💝 源码分支：${{ env.SOURCE_REF }}
            - 🧾 源码提交：${{ env.SOURCE_SHA }}
            - 🌐 默认地址：192.168.1.1
            - 🔑 默认密码：无

      - name: Show disk usage
        if: always()
        run: df -hT
